<!DOCTYPE html>

<html lang="en">
<head>
  <title>The Grandview Community Calendar — Print</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  iframe {
    display: block;
    width: 100%;
    height: 100vh;
    border: none;
  }
  @media print {
    @page { margin: 0.3in; }
    iframe {
      height: auto;
      min-height: 100vh;
    }
  }
</style>

</head>
<body>
  <iframe
    src="https://calendar.google.com/calendar/embed?height=450&wkst=1&ctz=America%2FNew_York&mode=AGENDA&title=The%20Grandview%20Community%20Calendar&showTz=0&src=Z3JhbmR2aWV3ZXhjaGFuZ2VjYWxlbmRhckBnbWFpbC5jb20&color=%23039be5"
    scrolling="no">
  </iframe>
<script>
  document.querySelector('iframe').onload = function() {
    setTimeout(window.print, 2000);
  };
</script>


</body>
</html>

<!DOCTYPE html>

<html lang="en">
<head>
  <title>The Grandview Community Calendar — Print</title>
  <style>
    @page { size: landscape; margin: 0.3in; }
    body  { margin: 0; padding: 0; font-family: sans-serif; }
    .notice {
      background: #0a5c60;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 10px 16px;
      font-size: 0.95rem;
    }
    .print-btn {
      background: #fff;
      color: #0a5c60;
      border: none;
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .print-btn:hover { background: #e0f0f0; }
    iframe {
      width: 100%;
      height: calc(100vh - 48px);
      border: none;
      display: block;
    }
    @media print {
      .notice { display: none; }
      iframe   { height: 100vh; }
    }
    @media print {
  iframe {
    height: 100vh;
    page-break-after: avoid;
    page-break-inside: avoid;
  }
}
  </style>
</head>
<body>
  <iframe
    src="https://calendar.google.com/calendar/embed?height=450&wkst=1&ctz=America%2FNew_York&mode=AGENDA&title=The%20Grandview%20Community%20Calendar&showTz=0&src=Z3JhbmR2aWV3ZXhjaGFuZ2VjYWxlbmRhckBnbWFpbC5jb20&color=%23039be5"
    scrolling="no">
  </iframe>
<script>
  document.querySelector('iframe').onload = function() {
    setTimeout(window.print, 2000);
  };
</script>


</body>
</html>
